site_name: Agentic Design Patterns - 智能体设计模式 (中英文版本)
site_description: Agentic Design Patterns 中英文版，智能体设计模式
site_author: ningg@GitHub
copyright: https://ningg.top/Agentic-Design-Patterns-CN
site_url: http://ningg.top/Agentic-Design-Patterns-CN
repo_url: https://github.com/ningg/Agentic-Design-Patterns-CN
docs_dir: cn
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang:
        - zh
        - en
  # PDF generation is toggled via MKDOCS_ENABLE_PDF=1 for the deploy build.
  # Strict CI uses `mkdocs-strict.yml` so `mkdocs-with-pdf` is not imported at all.
  - with-pdf:
      enabled_if_env: MKDOCS_ENABLE_PDF
      output_path: pdf/Agentic-Design-Patterns-CN.pdf
      toc_level: 2
      ordered_chapter_level: 0
      cover_subtitle: A Hands-On Guide to Building Intelligent Systems , 构建智能系统的实践指南
      custom_template_path: pdf-template

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

extra_css:
  - stylesheets/extra.css

extra:
  generator: false

